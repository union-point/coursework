<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Polytech Alumni Network</title>
  <link rel="stylesheet" href="./css/auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>
  <div class="container">
    <div class="login-box">
      <div class="logo-container-horizontal">
        <img class="pi-img" src="./image/logo.png" alt="Logo" class="logo-img">
        <h1 class="pi-logo-text">PolyLink</h1>
      </div>
      <form id="register-form">
        <p class="error-message"></p>

        <label for="firstname">Անուն</label>
        <input type="text" id="firstname" placeholder="Ձեր անունը" />
        <label for="lastname">Ազգանուն</label>
        <input type="text" id="lastname" placeholder="Ձեր ազգանունը" />

        <label for="email">«Պոլիտեխնիկի» էլ. փոստ</label>
        <input type="text" id="email" placeholder="օրինակ@polytech.am" />

        <label for="password"> Գաղտնաբառ</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Մուտքագրեք գաղտնաբառ" />
          <button type="button" class="toggle-password" id="toggle-new">👁️</button>
        </div>
        <div class="password-strength">
          <div class="password-strength-bar" id="strength-bar"></div>
        </div>
        <div class="logo-container-horizontal">

          <div class="strength-text" id="strength-text"></div>

          <label for="confirm-password">Հաստատեք գաղտնաբառը</label>
        </div>

        <div class="password-wrapper">
          <input type="password" id="confirm" placeholder="Կրկին մուտքագրեք գաղտնաբառը" />
          <button type="button" class="toggle-password" id="toggle-confirm">👁️</button>
        </div>

        <div class="password-requirements">
          <h4>Գաղտնաբառի պահանջներ՝</h4>
          <div class="requirement" id="req-length">Նվազագույնը 8 նիշ</div>
          <div class="requirement" id="req-uppercase">Առնվազն 1 մեծատառ</div>
          <div class="requirement" id="req-number">Առնվազն 1 թիվ</div>
          <div class="requirement" id="req-special">Առնվազն 1 հատուկ նիշ (!@#$%^&*)</div>
        </div>

        <button type="submit" class="signin-btn" id="submit-btn">Գրանցվել</button>

        <p class=" bottom-text">
          Արդեն ունե՞ք հաշիվ։ <a href="login.html">Մուտք</a>
        </p>
      </form>
    </div>
  </div>
  <!-- add required in inputs after testing*/ 

  ---!!!--- remove after testing   ---!!!---
  -->
  <script src="./js/register.js"></script>

  <script type="module" src="./js/register.js"></script>
</body>


</html>
